name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Pre-DNS preview: build with basePath=/pavankumar.com so the site
      # works at pavankumarkolla-prof.github.io/pavankumar.com/.
      # Post-DNS (custom domain active): unset PAGES_PREVIEW in repo variables
      # and the site will build for root + write CNAME.
      - name: Build
        run: npm run build
        env:
          PAGES_PREVIEW: ${{ vars.PAGES_PREVIEW || '1' }}

      - name: Add CNAME (only when serving at custom domain root)
        if: ${{ vars.PAGES_PREVIEW == '' }}
        run: echo "pavankumar.com" > out/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
