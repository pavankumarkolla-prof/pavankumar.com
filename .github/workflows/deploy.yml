name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # PRE-DNS PREVIEW MODE (current):
      #   site serves at pavankumarkolla-prof.github.io/pavankumar.com/
      #   next.config uses basePath=/pavankumar.com, no CNAME written.
      #
      # POST-DNS PRODUCTION MODE (flip when DNS is live):
      #   1. Set repo variable PAGES_PRODUCTION=1
      #      (Settings -> Secrets and variables -> Actions -> Variables tab -> New)
      #   2. Re-run this workflow.
      - name: Build (preview mode)
        if: ${{ vars.PAGES_PRODUCTION != '1' }}
        run: npm run build
        env:
          PAGES_PREVIEW: "1"

      - name: Build (production mode)
        if: ${{ vars.PAGES_PRODUCTION == '1' }}
        run: npm run build

      - name: Add CNAME (production only)
        if: ${{ vars.PAGES_PRODUCTION == '1' }}
        run: echo "pavankumar.com" > out/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
